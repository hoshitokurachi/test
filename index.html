<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>個人成績ランキング（スマホ用）</title>
<style>
:root{--bg:#0b1220;--card:#111a2b;--text:#e8eefc;--muted:#9fb0d0;--line:#23314f;--pill:#0e2740;--pillline:#1a3b66;--gold:#f7d34a;--silver:#c7d1db;--bronze:#d7a16e;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);} 
header{position:sticky;top:0;background:linear-gradient(180deg, rgba(11,18,32,.98), rgba(11,18,32,.85));backdrop-filter: blur(8px);padding:14px 14px 10px;border-bottom:1px solid var(--line);z-index:10;}
h1{font-size:16px;margin:0 0 6px;}
.sub{font-size:12px;color:var(--muted);margin:0;line-height:1.4;}
.wrap{padding:12px 14px 24px;max-width:980px;margin:0 auto;}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0;}
select,input{background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;}
input{flex:1;min-width:180px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;}
.card h2{font-size:14px;margin:0 0 10px;}
.badge{display:inline-block;font-size:11px;color:var(--muted);border:1px solid var(--line);padding:3px 8px;border-radius:999px;margin-left:6px;}
.pill{display:inline-block;padding:2px 10px;border-radius:999px;background:var(--pill);border:1px solid var(--pillline);color:#bcd6ff;font-size:12px;}
.table{width:100%;border-collapse:collapse;}
.table th,.table td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;}
.table th:first-child,.table td:first-child{text-align:left;}
.table th{font-size:12px;color:var(--muted);font-weight:600;background:var(--card);} /* stickyは使わず重なり回避 */
.rank{font-variant-numeric:tabular-nums;}
.small{font-size:12px;color:var(--muted);}
.footer{color:var(--muted);font-size:11px;margin-top:14px;line-height:1.6;}

/* TOP3 cards */
.top3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
@media (max-width: 720px){.top3{grid-template-columns:1fr;}}
.medalCard{border-radius:14px;border:1px solid var(--line);padding:12px;background:linear-gradient(180deg, rgba(17,26,43,.95), rgba(17,26,43,.75));}
.medalHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.medalTitle{font-size:12px;color:var(--muted);}
.medalIcon{font-size:18px;}
.medalValue{font-size:20px;font-weight:700;letter-spacing:.2px;}
.medalName{margin-top:6px;font-size:14px;white-space:normal;line-height:1.35;}
.gold{outline:1px solid rgba(247,211,74,.35);box-shadow:0 0 0 1px rgba(247,211,74,.15) inset;}
.silver{outline:1px solid rgba(199,209,219,.35);box-shadow:0 0 0 1px rgba(199,209,219,.12) inset;}
.bronze{outline:1px solid rgba(215,161,110,.35);box-shadow:0 0 0 1px rgba(215,161,110,.12) inset;}
</style>
</head>
<body>
<header>
  <h1>個人成績ランキング（スマホ用）</h1>
  <p class="sub">項目別ランキング（同率同順位：1,2,2,4…）＋TOP3カード表示（🥇🥈🥉）。</p>
</header>

<div class="wrap">
  <div class="controls">
    <label class="pill">項目
      <select id="metric"></select>
    </label>
    <label class="pill">並び
      <select id="order"></select>
    </label>
    <label class="pill">最低打数
      <select id="minab">
        <option value="0">指定なし</option>
        <option value="5">5以上</option>
        <option value="10">10以上</option>
        <option value="20">20以上</option>
      </select>
    </label>
    <input id="q" placeholder="選手名で検索（例：しょうご）" />
  </div>

  <div class="card">
    <h2>TOP3 <span class="badge" id="top3Label"></span></h2>
    <div class="small" id="top3Note"></div>
    <div class="top3" id="top3"></div>
  </div>

  <div class="card" id="rankCard">
    <h2>ランキング <span class="badge" id="metricLabel"></span></h2>
    <div class="small" id="note"></div>
    <div style="overflow:auto; border-radius:12px;">
      <table class="table" id="rankTable">
        <thead><tr><th>順位</th><th>選手</th><th id="valHead">値</th><th>打数</th><th>安打</th><th>三振</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>全選手一覧（横スクロール可） <span class="badge">検索と連動</span></h2>
    <div style="overflow:auto; border-radius:12px;">
      <table class="table" id="allTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    ■個人運用（無料）：Excel更新 → このHTMLを再生成して配布（AirDrop/LINE/メールなど） or 無料ホスティングに上書き。<br/>
    ■注意：打数が少ない選手は率が上下しやすいので「最低打数」フィルタが有効です。
  </div>
</div>

<script>
const data = [{"選手": "りょう", "打率": 0.75, "打数": 4.0, "安打": 3.0, "単打": 1.0, "二塁打": 2.0, "三塁打": null, "本塁打": null, "打点": 1.0, "四球": null, "死球": null, "犠打": null, "犠飛": null, "盗塁": 2.0, "三振": null, "出塁率": 0.75, "長打率": 1.25, "OPS": 2.0}, {"選手": "のあ", "打率": 0.16666666666666666, "打数": 6.0, "安打": 1.0, "単打": 1.0, "二塁打": null, "三塁打": null, "本塁打": null, "打点": 1.0, "四球": null, "死球": null, "犠打": null, "犠飛": null, "盗塁": null, "三振": null, "出塁率": 0.16666666666666666, "長打率": 0.16666666666666666, "OPS": 0.3333333333333333}, {"選手": "しょうご", "打率": 0.3673469387755102, "打数": 49.0, "安打": 18.0, "単打": 13.0, "二塁打": 5.0, "三塁打": null, "本塁打": null, "打点": 13.0, "四球": 4.0, "死球": null, "犠打": 1.0, "犠飛": null, "盗塁": 6.0, "三振": 4.0, "出塁率": 0.41509433962264153, "長打率": 0.46938775510204084, "OPS": 0.8844820947246823}, {"選手": "あんり", "打率": 0.2647058823529412, "打数": 34.0, "安打": 9.0, "単打": 7.0, "二塁打": 2.0, "三塁打": null, "本塁打": null, "打点": 6.0, "四球": 6.0, "死球": null, "犠打": 4.0, "犠飛": 1.0, "盗塁": 6.0, "三振": 2.0, "出塁率": 0.36585365853658536, "長打率": 0.3235294117647059, "OPS": 0.6893830703012913}, {"選手": "けんた", "打率": 0.15384615384615385, "打数": 26.0, "安打": 4.0, "単打": 3.0, "二塁打": 1.0, "三塁打": null, "本塁打": null, "打点": 5.0, "四球": 7.0, "死球": 1.0, "犠打": 2.0, "犠飛": null, "盗塁": 8.0, "三振": 2.0, "出塁率": 0.35294117647058826, "長打率": 0.19230769230769232, "OPS": 0.5452488687782806}, {"選手": "ひなた", "打率": 0.22580645161290322, "打数": 31.0, "安打": 7.0, "単打": 6.0, "二塁打": 1.0, "三塁打": null, "本塁打": null, "打点": 7.0, "四球": 2.0, "死球": 5.0, "犠打": 3.0, "犠飛": null, "盗塁": 8.0, "三振": null, "出塁率": 0.3684210526315789, "長打率": 0.25806451612903225, "OPS": 0.6264855687606112}, {"選手": "はると", "打率": 0.20588235294117646, "打数": 34.0, "安打": 7.0, "単打": 6.0, "二塁打": 1.0, "三塁打": null, "本塁打": null, "打点": 6.0, "四球": 4.0, "死球": null, "犠打": null, "犠飛": null, "盗塁": 4.0, "三振": 5.0, "出塁率": 0.2894736842105263, "長打率": 0.23529411764705882, "OPS": 0.5247678018575852}, {"選手": "かずま", "打率": 0.08333333333333333, "打数": 36.0, "安打": 3.0, "単打": 3.0, "二塁打": null, "三塁打": null, "本塁打": null, "打点": 2.0, "四球": 8.0, "死球": 2.0, "犠打": 3.0, "犠飛": null, "盗塁": 12.0, "三振": 11.0, "出塁率": 0.2826086956521739, "長打率": 0.08333333333333333, "OPS": 0.3659420289855072}, {"選手": "たいち", "打率": 0.23529411764705882, "打数": 34.0, "安打": 8.0, "単打": 7.0, "二塁打": 1.0, "三塁打": null, "本塁打": null, "打点": 4.0, "四球": 12.0, "死球": 4.0, "犠打": 2.0, "犠飛": null, "盗塁": 22.0, "三振": 5.0, "出塁率": 0.48, "長打率": 0.2647058823529412, "OPS": 0.7447058823529411}, {"選手": "りゅうや", "打率": 0.2702702702702703, "打数": 37.0, "安打": 10.0, "単打": 8.0, "二塁打": 2.0, "三塁打": null, "本塁打": null, "打点": 9.0, "四球": 9.0, "死球": 1.0, "犠打": 3.0, "犠飛": null, "盗塁": 9.0, "三振": 9.0, "出塁率": 0.425531914893617, "長打率": 0.32432432432432434, "OPS": 0.7498562392179413}, {"選手": "りょうえい", "打率": 0.37777777777777777, "打数": 45.0, "安打": 17.0, "単打": 11.0, "二塁打": 4.0, "三塁打": 2.0, "本塁打": null, "打点": 12.0, "四球": 4.0, "死球": null, "犠打": null, "犠飛": null, "盗塁": 9.0, "三振": 11.0, "出塁率": 0.42857142857142855, "長打率": 0.5555555555555556, "OPS": 0.9841269841269842}, {"選手": "ゆうご", "打率": null, "打数": 0.0, "安打": null, "単打": null, "二塁打": null, "三塁打": null, "本塁打": null, "打点": null, "四球": 2.0, "死球": null, "犠打": null, "犠飛": null, "盗塁": null, "三振": null, "出塁率": 1.0, "長打率": null, "OPS": null}, {"選手": "りょうま", "打率": 0.0, "打数": 2.0, "安打": null, "単打": null, "二塁打": null, "三塁打": null, "本塁打": null, "打点": null, "四球": null, "死球": null, "犠打": null, "犠飛": null, "盗塁": 1.0, "三振": 2.0, "出塁率": 0.0, "長打率": 0.0, "OPS": 0.0}, {"選手": "しょうたろう", "打率": 0.0, "打数": 1.0, "安打": null, "単打": null, "二塁打": null, "三塁打": null, "本塁打": null, "打点": null, "四球": 1.0, "死球": null, "犠打": null, "犠飛": null, "盗塁": null, "三振": null, "出塁率": 0.5, "長打率": 0.0, "OPS": 0.5}];
const team = {"打率": 0.25663716814159293, "打数": 339.0, "安打": 87.0, "単打": 66.0, "二塁打": 19.0, "三塁打": 2.0, "本塁打": 0.0, "打点": 66.0, "四球": 59.0, "死球": 13.0, "犠打": 18.0, "犠飛": 1.0, "盗塁": 87.0, "三振": 51.0, "出塁率": 0.3859223300970874, "長打率": 0.32448377581120946, "OPS": 0.7104061059082969};
const allCols = ["選手", "打率", "打数", "安打", "単打", "二塁打", "三塁打", "本塁打", "打点", "四球", "死球", "犠打", "犠飛", "盗塁", "三振", "出塁率", "長打率", "OPS"];
const metrics = ["打率", "出塁率", "長打率", "OPS", "打点", "本塁打", "盗塁", "三振", "安打", "二塁打", "三塁打", "四球", "死球"];
const defaultOrder = {"打率": "desc", "出塁率": "desc", "長打率": "desc", "OPS": "desc", "打点": "desc", "本塁打": "desc", "盗塁": "desc", "三振": "asc", "安打": "desc", "二塁打": "desc", "三塁打": "desc", "四球": "desc", "死球": "desc"};
const fmtCols = new Set(["打率", "出塁率", "長打率", "OPS"]);

function fmt(col, val){
  if (val===null || val===undefined || Number.isNaN(val)) return '';
  if (fmtCols.has(col)){
    let s = val.toFixed(3);
    s = s.replace(/\.0+$/,'').replace(/(\.[0-9]*?)0+$/,'$1');
    return s;
  }
  if (Math.abs(val - Math.round(val)) < 1e-9) return String(Math.round(val));
  return String(val);
}

function computeCompetitionRanks(rows, key){
  // 同率同順位（competition ranking: 1,2,2,4…）
  let prev = null;
  let currentRank = 0;
  rows.forEach((r, idx)=>{
    const v = r[key];
    if (prev === null || v !== prev){
      currentRank = idx + 1;
      prev = v;
    }
    r.__rank = currentRank;
  });
}

function groupByRank(rows){
  // rankごとにまとめる（同率の場合は複数名をまとめてTOP3カードに表示）
  const groups = [];
  let current = null;
  rows.forEach(r=>{
    if (!current || current.rank !== r.__rank){
      current = {rank:r.__rank, value:r.__value, players:[r]};
      groups.push(current);
    } else {
      current.players.push(r);
    }
  });
  return groups;
}

const metricSel = document.getElementById('metric');
const orderSel  = document.getElementById('order');
const minabSel  = document.getElementById('minab');

metrics.forEach(m=>{
  const o=document.createElement('option');
  o.value=m; o.textContent=m;
  metricSel.appendChild(o);
});
metricSel.value = metrics[0];

function setOrderOptions(metric){
  orderSel.innerHTML='';
  const o1=document.createElement('option'); o1.value='desc'; o1.textContent='多い/高い順（↓）';
  const o2=document.createElement('option'); o2.value='asc';  o2.textContent='少ない/低い順（↑）';
  orderSel.appendChild(o1); orderSel.appendChild(o2);
  orderSel.value = (defaultOrder[metric] || 'desc');
}
setOrderOptions(metricSel.value);

function renderAllTable(filterText=''){
  const thead=document.querySelector('#allTable thead');
  const tbody=document.querySelector('#allTable tbody');
  thead.innerHTML=''; tbody.innerHTML='';

  const trh=document.createElement('tr');
  allCols.forEach(c=>{
    const th=document.createElement('th'); th.textContent=c; trh.appendChild(th);
  });
  thead.appendChild(trh);

  const rows = data.filter(r=> !filterText || String(r['選手']).includes(filterText));
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    allCols.forEach(c=>{
      const td=document.createElement('td');
      td.textContent = (c==='選手') ? r[c] : fmt(c, r[c]);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function renderTop3(groups, key){
  const top3Div = document.getElementById('top3');
  top3Div.innerHTML='';

  const medals = [
    {rank:1, cls:'gold',   icon:'🥇', title:'1位'},
    {rank:2, cls:'silver', icon:'🥈', title:'2位'},
    {rank:3, cls:'bronze', icon:'🥉', title:'3位'},
  ];

  medals.forEach(m=>{
    const g = groups.find(x=>x.rank===m.rank);
    const card = document.createElement('div');
    card.className = `medalCard ${m.cls}`;

    const header = document.createElement('div');
    header.className='medalHeader';
    const t = document.createElement('div');
    t.className='medalTitle';
    t.textContent = m.title;
    const ic = document.createElement('div');
    ic.className='medalIcon';
    ic.textContent = m.icon;
    header.appendChild(t); header.appendChild(ic);

    const val = document.createElement('div');
    val.className='medalValue';
    const names = document.createElement('div');
    names.className='medalName';

    if (!g){
      val.textContent = '—';
      names.textContent = '該当なし';
    } else {
      val.textContent = fmt(key, g.value);
      names.textContent = g.players.map(p=>p['選手']).join(' / ');
    }

    card.appendChild(header);
    card.appendChild(val);
    card.appendChild(names);
    top3Div.appendChild(card);
  });
}

function renderRanking(){
  const key=metricSel.value;
  const order=orderSel.value;
  const q=document.getElementById('q').value.trim();
  const minab=parseInt(minabSel.value,10);

  document.getElementById('metricLabel').textContent = key;
  document.getElementById('valHead').textContent = key;
  document.getElementById('top3Label').textContent = key;

  let rows = data
    .filter(r=> r[key]!==null && r[key]!==undefined && !Number.isNaN(r[key]))
    .filter(r=> !q || String(r['選手']).includes(q));

  if (!Number.isNaN(minab) && minab>0){
    rows = rows.filter(r=> (r['打数']||0) >= minab);
  }

  rows.sort((a,b)=>{
    const va=a[key], vb=b[key];
    return order==='asc' ? (va-vb) : (vb-va);
  });

  // keep value for grouping
  rows.forEach(r=>{ r.__value = r[key]; });
  computeCompetitionRanks(rows, key);

  // TOP3 groups by rank 1/2/3
  const groups = groupByRank(rows);
  renderTop3(groups, key);

  // note
  let note='';
  if (team && team[key]!=null && team[key]!==undefined && !Number.isNaN(team[key])){
    note = `チーム（合計行）: ${key} = ${fmt(key,team[key])}`;
  }
  if (minab>0){
    note = (note? (note+' / ') : '') + `最低打数：${minab} 以上`;
  }
  document.getElementById('note').textContent = note;
  document.getElementById('top3Note').textContent = note;

  // table
  const tbody=document.querySelector('#rankTable tbody');
  tbody.innerHTML='';
  rows.forEach((r)=>{
    const tr=document.createElement('tr');
    const cells=[
      {val:String(r.__rank), cls:'rank'},
      {val:r['選手'], left:true},
      {val:fmt(key,r[key])},
      {val:fmt('打数', r['打数'])},
      {val:fmt('安打', r['安打'])},
      {val:fmt('三振', r['三振'])},
    ];
    cells.forEach(c=>{
      const td=document.createElement('td');
      td.textContent=c.val;
      if (c.left) td.style.textAlign='left';
      if (c.cls) td.className=c.cls;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  renderAllTable(q);
}

metricSel.addEventListener('input', ()=>{ setOrderOptions(metricSel.value); renderRanking(); });
['order','minab','q'].forEach(id=>{ document.getElementById(id).addEventListener('input', renderRanking); });
renderRanking();
</script>
</body>
</html>
